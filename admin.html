<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Mina Audition</title>
  <link rel="stylesheet" href="css/admin.css">
</head>

<body>
  <section id="loginBox" class="login-box">
    <div class="login-card">
      <div class="eyebrow">Mina Audition</div>
      <h1>Đăng nhập Admin</h1>
      <p class="muted">Chỉ tài khoản quản trị mới có quyền đăng bài.</p>

      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="loginEmail" placeholder="Nhập email admin" required>

        <label>Mật khẩu</label>
        <input type="password" id="loginPassword" placeholder="Nhập mật khẩu" required>

        <button type="submit">Đăng nhập</button>
      </form>

      <p id="loginMessage" class="login-message"></p>
    </div>
  </section>

  <main id="adminApp" class="admin hidden">
    <div class="admin-header">
      <div>
        <div class="eyebrow">Mina Audition</div>
        <h1>Trang quản trị</h1>
        <p class="muted">Đăng và quản lý bài viết cho website.</p>
        <p id="adminEmail" class="muted small-text"></p>
      </div>

      <div class="top-actions">
        <button id="logoutBtn" type="button">Đăng xuất</button>
        <a href="/">Về trang chủ</a>
      </div>
    </div>

    <section class="panel">
      <h2>Đăng bài viết</h2>

      <form id="postForm">
        <label>Tiêu đề</label>
        <input type="text" id="title" placeholder="Nhập tiêu đề bài viết">

        <label>Danh mục</label>
        <input type="text" id="category" placeholder="Ví dụ: Review Skill">

        <label>Link ảnh</label>
        <input type="text" id="image" placeholder="images/ten-anh.png">

        <label>Mô tả ngắn</label>
        <textarea id="desc" placeholder="Nhập mô tả ngắn"></textarea>

        <label>Nội dung bài viết</label>
        <textarea id="content" placeholder="Nhập nội dung chi tiết"></textarea>

        <label>Link ngoài nếu có</label>
        <input type="text" id="link" placeholder="https://...">

        <div class="actions">
          <button type="submit">Lưu bài viết</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <h2>Danh sách bài viết</h2>
      <div id="postList"></div>
    </section>
  </main>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
