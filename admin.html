<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin V2 | Mina Audition</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>

<body>
  <main class="admin">
    <header class="admin-header">
      <div>
        <p class="eyebrow">MinaAudition.vn</p>
        <h1>Admin V2</h1>
        <p class="muted">Tạo bài viết, copy dữ liệu và gửi mình để gắn lên website.</p>
      </div>

      <a href="index.html" target="_blank">Xem website</a>
    </header>

    <section class="panel">
      <h2>Thêm / sửa bài viết</h2>

      <input type="hidden" id="editIndex" value="-1" />

      <label>Tiêu đề bài viết</label>
      <input id="title" placeholder="Ví dụ: Share bảng skill Poppin D8 đẹp nhất" />

      <label>Danh mục</label>
      <select id="category">
        <option>Share Skill</option>
        <option>Edit Video</option>
        <option>Ảnh 3D Audition</option>
        <option>Câu lệnh AI</option>
        <option>Tin tức Mina</option>
      </select>

      <label>Ảnh đại diện</label>
      <input id="image" placeholder="Ví dụ: images/bang-skill-poppin.jpg" />

      <label>Mô tả ngắn</label>
      <textarea id="desc" placeholder="Mô tả ngắn hiển thị ngoài blog..."></textarea>

      <label>Nội dung bài viết</label>
      <textarea id="content" placeholder="Viết nội dung bài chia sẻ tại đây..."></textarea>

      <label>Link liên quan</label>
      <input id="link" placeholder="YouTube / Facebook / TikTok nếu có" />

      <label class="check">
        <input type="checkbox" id="featured" />
        Ghim bài nổi bật
      </label>

      <div class="actions">
        <button class="primary" id="saveBtn">Lưu bài viết</button>
        <button id="clearBtn">Xóa form</button>
      </div>
    </section>

    <section class="panel">
      <h2>Danh sách bài viết</h2>
      <div id="postList"></div>
    </section>

    <section class="panel">
      <h2>Dữ liệu posts.json</h2>
      <p class="muted">Bấm copy rồi dán vào file <b>data/posts.json</b>.</p>
      <button class="copy" id="copyBtn">Copy dữ liệu</button>
      <pre id="output"></pre>
    </section>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
