<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chi tiết bài viết | Mina Audition</title>
  <link rel="stylesheet" href="css/style.css?v=5">
  <link rel="icon" href="/images/logo-mina.png">
</head>

<body>
  <div id="fb-root"></div>

  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="index.html">
        <img src="/images/logo-mina.png" onerror="this.style.display='none'">
        <span>Mina Audition</span>
      </a>

      <nav class="main-nav">
        <a href="index.html">TRANG CHỦ</a>
        <a class="active" href="blog.html">MINA BLOG</a>
        <a href="wiki.html">WIKI SKILL</a>
        <a href="admin.html">ADMIN</a>
      </nav>
    </header>

    <main class="page">
      <div id="postDetail" class="post-detail">
        <p class="muted">Đang tải bài viết...</p>
      </div>
    </main>

    <footer class="footer">
      <div>
        <h3>Mina Audition</h3>
        <p>Dance • Poppin • Audition VTC</p>
      </div>
    </footer>
  </div>

  <script>
    (() => {
      const target = document.getElementById("postDetail");
      window.__MINA_POST_READY__ = false;
      window.__MINA_POST_WATCHDOG__ = setTimeout(() => {
        if (window.__MINA_POST_READY__ || !target) return;
        target.innerHTML = `
          <article class="post-card">
            <h1>Không tải được bài viết</h1>
            <p class="muted">Hệ thống phản hồi quá lâu. Vui lòng tải lại trang.</p>
            <button class="read-more" type="button" onclick="location.reload()">Tải lại trang</button>
            <a href="blog.html" class="read-more">← Quay lại Mina Blog</a>
          </article>`;
      }, 15000);
    })();
  </script>
  <script type="module" src="/js/post.js?v=9.0.0"></script>
  <script type="module" src="/js/mina-seo-pro.js?v=2.0.0"></script>
</body>
</html>
