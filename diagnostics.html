<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mina V14 Diagnostics</title><style>body{font-family:Arial;background:#070716;color:#fff;padding:24px}pre{white-space:pre-wrap;background:#151526;padding:16px;border-radius:12px}.ok{color:#74f0a7}.bad{color:#ff8c9a}</style></head><body><h1>Mina V14 Diagnostics</h1><pre id="out">Đang kiểm tra...</pre><script type="module">import {getPublicPosts,getWikiSkills} from '/js/v14/repository.js?v=14';const out=document.querySelector('#out');let lines=[];try{const x=await getWikiSkills();lines.push('OK Wiki: '+x.length+' skills')}catch(e){lines.push('LỖI Wiki: '+e.message)}try{const x=await getPublicPosts();lines.push('OK Firestore: '+x.length+' posts')}catch(e){lines.push('LỖI Firestore: '+e.message)}out.textContent=lines.join('\n');out.className=lines.some(x=>x.startsWith('LỖI'))?'bad':'ok';</script></body></html>
