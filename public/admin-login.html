<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Đăng nhập Mina CMS v4 Enterprise</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;
    color:#fff;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at 15% 10%,#4a1558 0,transparent 35%),linear-gradient(135deg,#070611,#150d2a)}
    .card{width:min(430px,100%);padding:30px;border-radius:24px;background:rgba(17,13,35,.92);border:1px solid #3a3158;box-shadow:0 24px 80px #0008}
    .logo{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;margin:0 auto 14px;background:linear-gradient(135deg,#ec4899,#7c3aed);font-size:28px;font-weight:900}
    h1,p{text-align:center}h1{margin:0 0 7px}p{margin:0 0 24px;color:#bdb6d6}.field{margin-bottom:14px}.field label{display:block;margin-bottom:7px;font-weight:700}
    input{width:100%;height:46px;border:1px solid #40365f;border-radius:13px;background:#0c0a19;color:#fff;padding:0 13px;outline:none}
    input:focus{border-color:#d946ef;box-shadow:0 0 0 3px #d946ef22}.remember{display:flex;gap:8px;align-items:center;margin:6px 0 18px}.remember input{width:auto;height:auto}
    button{width:100%;height:48px;border:0;border-radius:14px;color:#fff;font-weight:900;cursor:pointer;background:linear-gradient(135deg,#ec4899,#7c3aed)}
    button:disabled{opacity:.6}.error{min-height:20px;margin-top:13px;text-align:center;color:#fda4af;font-weight:700}.back{display:block;text-align:center;margin-top:18px;color:#e9d5ff;text-decoration:none}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">M</div>
    <h1>Mina CMS v4</h1>
    <p>Đăng nhập vào hệ thống quản trị Enterprise.</p>
    <form id="loginForm">
      <div class="field"><label for="username">Tài khoản</label><input id="username" autocomplete="username" required></div>
      <div class="field"><label for="password">Mật khẩu</label><input id="password" type="password" autocomplete="current-password" required></div>
      <label class="remember"><input id="remember" type="checkbox" checked> Ghi nhớ đăng nhập</label>
      <button id="submitButton" type="submit">Đăng nhập</button>
      <div id="error" class="error" aria-live="polite"></div>
    </form>
    <a class="back" href="/">← Quay lại website</a>
  </main>
  <script>
    (() => {
      "use strict";
      const SESSION_KEY = "mina_admin_api_key_session";
      const form = document.getElementById("loginForm");
      const errorBox = document.getElementById("error");
      const button = document.getElementById("submitButton");
      const params = new URLSearchParams(location.search);
      const returnUrl = params.get("returnUrl") || "/admin-v4.html";

      function validReturnUrl(value) {
        return typeof value === "string" && value.startsWith("/") && !value.startsWith("//");
      }
      function saveSession(apiKey, remember) {
        sessionStorage.setItem(SESSION_KEY, apiKey);
        sessionStorage.setItem("mina_admin_authenticated", "true");
        sessionStorage.setItem("mina_admin_token", apiKey);
        if (remember) {
          localStorage.setItem(SESSION_KEY, apiKey);
          localStorage.setItem("mina_admin_authenticated", "true");
          localStorage.setItem("mina_admin_token", apiKey);
        } else {
          localStorage.removeItem(SESSION_KEY);
          localStorage.removeItem("mina_admin_authenticated");
          localStorage.removeItem("mina_admin_token");
        }
      }

      const existing = sessionStorage.getItem(SESSION_KEY) || localStorage.getItem(SESSION_KEY);
      if (existing) location.replace(validReturnUrl(returnUrl) ? returnUrl : "/admin-v4.html");

      form.addEventListener("submit", async event => {
        event.preventDefault();
        errorBox.textContent = "";
        button.disabled = true;
        button.textContent = "Đang đăng nhập…";
        try {
          const response = await fetch("/api/admin/login", {
            method: "POST",
            credentials: "same-origin",
            cache: "no-store",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
              username: document.getElementById("username").value.trim(),
              password: document.getElementById("password").value,
              remember: document.getElementById("remember").checked
            })
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || result.success === false) {
            throw new Error(result.message || result.error || "Tài khoản hoặc mật khẩu không chính xác.");
          }
          const apiKey = result.apiKey || result.token || result.sessionToken;
          if (!apiKey) throw new Error("Máy chủ chưa trả về khóa phiên đăng nhập.");
          saveSession(apiKey, document.getElementById("remember").checked);
          location.replace(validReturnUrl(returnUrl) ? returnUrl : "/admin-v4.html");
        } catch (error) {
          errorBox.textContent = error.message || "Không thể đăng nhập.";
        } finally {
          button.disabled = false;
          button.textContent = "Đăng nhập";
        }
      });
    })();
  </script>
</body>
</html>
