<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Đăng nhập Mina CMS v4</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;
      color:#fff;font-family:Inter,Arial,sans-serif;
      background:radial-gradient(circle at 15% 10%,#4a1558 0,transparent 35%),
                 linear-gradient(135deg,#070611,#150d2a)
    }
    .card{
      width:min(430px,100%);padding:30px;border-radius:24px;
      background:rgba(17,13,35,.94);border:1px solid #3a3158;
      box-shadow:0 24px 80px #0008
    }
    .logo{
      width:58px;height:58px;border-radius:18px;display:grid;place-items:center;
      margin:0 auto 14px;background:linear-gradient(135deg,#ec4899,#7c3aed);
      font-size:28px;font-weight:900
    }
    h1,p{text-align:center}h1{margin:0 0 7px}p{margin:0 0 24px;color:#bdb6d6}
    .field{margin-bottom:14px}.field label{display:block;margin-bottom:7px;font-weight:700}
    input{
      width:100%;height:46px;border:1px solid #40365f;border-radius:13px;
      background:#0c0a19;color:#fff;padding:0 13px;outline:none
    }
    input:focus{border-color:#d946ef;box-shadow:0 0 0 3px #d946ef22}
    .remember{display:flex;gap:8px;align-items:center;margin:6px 0 18px}
    .remember input{width:auto;height:auto}
    button{
      width:100%;height:48px;border:0;border-radius:14px;color:#fff;
      font-weight:900;cursor:pointer;background:linear-gradient(135deg,#ec4899,#7c3aed)
    }
    button:disabled{opacity:.6}
    .error{min-height:20px;margin-top:13px;text-align:center;color:#fda4af;font-weight:700}
    .back{display:block;text-align:center;margin-top:18px;color:#e9d5ff;text-decoration:none}
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">M</div>
    <h1>Mina CMS v4</h1>
    <p>Đăng nhập bằng tài khoản Firebase Authentication.</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email quản trị</label>
        <input id="email" type="email" autocomplete="username" required>
      </div>

      <div class="field">
        <label for="password">Mật khẩu</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>

      <label class="remember">
        <input id="remember" type="checkbox" checked>
        Ghi nhớ đăng nhập
      </label>

      <button id="submitButton" type="submit">Đăng nhập</button>
      <div id="error" class="error" aria-live="polite"></div>
    </form>

    <a class="back" href="/">← Quay lại website</a>
  </main>

  <script type="module">
    import { auth } from "/js/firebase-config.js";
    import {
      browserLocalPersistence,
      browserSessionPersistence,
      onAuthStateChanged,
      setPersistence,
      signInWithEmailAndPassword
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

    const form = document.getElementById("loginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const rememberInput = document.getElementById("remember");
    const errorBox = document.getElementById("error");
    const button = document.getElementById("submitButton");

    const params = new URLSearchParams(window.location.search);
    const requestedReturnUrl = params.get("returnUrl") || "/admin-v4.html";

    function safeReturnUrl(value) {
      return typeof value === "string" &&
             value.startsWith("/") &&
             !value.startsWith("//")
        ? value
        : "/admin-v4.html";
    }

    onAuthStateChanged(auth, user => {
      if (user) {
        window.location.replace(safeReturnUrl(requestedReturnUrl));
      }
    });

    form.addEventListener("submit", async event => {
      event.preventDefault();
      errorBox.textContent = "";
      button.disabled = true;
      button.textContent = "Đang đăng nhập…";

      try {
        await setPersistence(
          auth,
          rememberInput.checked
            ? browserLocalPersistence
            : browserSessionPersistence
        );

        await signInWithEmailAndPassword(
          auth,
          emailInput.value.trim(),
          passwordInput.value
        );

        window.location.replace(safeReturnUrl(requestedReturnUrl));
      } catch (error) {
        const messages = {
          "auth/invalid-credential": "Email hoặc mật khẩu không chính xác.",
          "auth/invalid-email": "Địa chỉ email không hợp lệ.",
          "auth/too-many-requests": "Đăng nhập thất bại quá nhiều lần. Hãy thử lại sau."
        };

        errorBox.textContent =
          messages[error.code] ||
          error.message ||
          "Không thể đăng nhập.";
      } finally {
        button.disabled = false;
        button.textContent = "Đăng nhập";
      }
    });
  </script>
</body>
</html>
