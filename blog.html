<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài viết | Mina Audition</title>
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="index.html">
<span>Mina Audition</span>
      </a>

      <nav class="main-nav" id="mainNav">
        <a href="index.html">TRANG CHỦ</a>
        <a class="active" href="blog.html">MINA BLOG</a>
        <a href="wiki.html">WIKI SKILL</a>
        <a href="admin.html">ADMIN</a>
      </nav>
    </header>

    <main class="page">
      <h1>Mina Blog</h1>

      <p class="muted">
        Khám phá những bài viết mới nhất về Audition, Review Skill,
        hướng dẫn và kinh nghiệm từ Mina Audition.
      </p>

      <div class="blog-layout">
        <aside class="blog-category-box">
          <h3>📁 DANH MỤC MINA BLOG</h3>
          <p class="muted">Đang tải danh mục...</p>
        </aside>

        <div id="blogPosts" class="post-list"></div>
      </div>
    </main>

    <footer class="footer">
      <div>
        <h3>Mina Audition</h3>
        <p>Dance • Poppin • Audition VTC</p>
      </div>
    </footer>
  </div>

  <script type="module" src="js/blog.js?v=5.0.0"></script>

  <script>
    function minaLike(button) {
      const count = button.querySelector("span");
      const number = Number.parseInt(count?.innerText || "0", 10) + 1;

      if (count) count.innerText = number;
      button.classList.add("liked");
    }

    function copyPostLink() {
      navigator.clipboard
        .writeText(window.location.href)
        .then(() => alert("Đã sao chép link bài viết Mina!"));
    }
  </script>
  <script type="module" src="/js/mina-seo-pro.js?v=2.0.0"></script>
  <script type="module" src="/js/v5/runtime.js?v=5.0.0"></script>
</body>
