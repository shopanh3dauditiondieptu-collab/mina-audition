<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Wiki Mina</title>

  <link rel="stylesheet" href="admin-wiki.css" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
  <main class="admin-wrap">
    <header class="admin-head">
      <div>
        <h1>Admin Wiki Mina</h1>
        <p>Quản lý dữ liệu Skill Audition nhanh bằng form hoặc Excel.</p>
      </div>

      <div class="admin-actions">
        <a href="index.html" class="btn ghost">← Trang chủ</a>
        <a href="wiki.html" class="btn ghost">Xem Wiki</a>
      </div>
    </header>

    <section class="panel">
      <h2>Nhập dữ liệu</h2>

      <div class="tool-row">
        <button id="loadJsonBtn" class="btn">Tải dữ liệu hiện tại</button>

        <label class="btn">
          Import Excel
          <input id="excelInput" type="file" accept=".xlsx,.xls,.csv" hidden />
        </label>

        <button id="exportJsonBtn" class="btn primary">Xuất wiki-skills.json</button>
        <button id="clearBtn" class="btn danger">Xoá dữ liệu tạm</button>
      </div>

      <p class="note">
        Excel nên có các cột: id, name, style, bpm, rarity, rating, image, youtube, description, tags.
      </p>
    </section>

    <section class="panel">
      <h2>Thêm / sửa skill</h2>

      <form id="skillForm" class="form-grid">
        <input name="id" placeholder="ID Skill, ví dụ: 47767" required />
        <input name="name" placeholder="Tên skill" required />
        <input name="style" placeholder="Style: Poppin, Sexy Girl..." />
        <input name="bpm" type="number" placeholder="BPM" />
        <input name="rarity" placeholder="Độ hiếm: S, A, B, C" />
        <input name="rating" type="number" step="0.1" placeholder="Điểm đẹp: 9.5" />

        <input name="image" placeholder="/images/wiki/skills/47767.webp" />
        <input name="youtube" placeholder="Link YouTube review skill" />

        <textarea name="description" placeholder="Mô tả skill"></textarea>
        <input name="tags" placeholder="Tag, cách nhau bằng dấu phẩy: D8, Audition, Poppin" />

        <button class="btn primary full" type="submit">Lưu skill</button>
      </form>
    </section>

    <section class="panel">
      <div class="table-head">
        <h2>Danh sách skill</h2>
        <input id="searchInput" placeholder="Tìm ID, tên skill, style..." />
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Tên skill</th>
              <th>Style</th>
              <th>BPM</th>
              <th>Hiếm</th>
              <th>Điểm</th>
              <th>YouTube</th>
              <th>Sửa</th>
            </tr>
          </thead>
          <tbody id="skillTable"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="admin-wiki.js"></script>
</body>
</html>
