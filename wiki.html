<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mina Wikipedia D8 Audition</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="stylesheet" href="/css/wiki.css?v=20260711-v10-final-fix">
</head>
<body>

<main class="mina-wiki-page">

  <!-- TOP NAV -->
  <nav class="wiki-top-nav">
    <a href="/index.html" class="wiki-nav-logo">🎵 Mina Audition</a>

    <div class="wiki-nav-links">
      <a href="index.html">Trang chủ</a>
      <a href="blog.html">Mina Blog</a>
      <a href="wiki.html" aria-current="page">Wikipedia D8</a>
      <a href="admin-wiki.html" class="wiki-admin-link">Admin CMS</a>
      <a href="https://www.youtube.com/@mina.audition" target="_blank" rel="noopener noreferrer">YouTube</a>
      <a href="index.html#contact">Liên hệ</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="wiki-hero">
    <span class="wiki-badge">MINA WIKIPEDIA</span>
    <h1>Wikipedia D8 Audition</h1>
    <p>Kho dữ liệu Skill Audition D8 do Mina xây dựng.</p>
  </section>

  <!-- MINA WIKI TOOLS -->
  <section class="mina-wiki-tools" id="minaWikiTools">

    <div class="mina-wiki-search-row">
      <input
        type="search"
        id="wikiSearch"
        class="mina-wiki-search"
        placeholder="🔍 Tìm ID, tên Skill, Style, BPM..."
        autocomplete="off"
      >

      <select id="wikiSort" class="mina-wiki-select">
        <option value="default">Sắp xếp</option>
        <option value="newest">Mới nhất</option>
        <option value="rating">Đẹp nhất</option>
        <option value="bpm">BPM tăng dần</option>
        <option value="id">Theo ID</option>
      </select>
    </div>

    <!-- Hàng Level + Type. Giữ class/ID để module lọc cũ tiếp tục hoạt động -->
    <div class="mina-wiki-filter-row" id="minaLevelTypeRow"></div>

    <!-- Hàng Tên Bước Nhảy + Rate -->
    <div class="mina-filter-row-two">
      <select id="danceFilter" class="mina-wiki-select">
        <option value="">Tên Bước Nhảy</option>
      </select>

      <select id="rateFilter" class="mina-wiki-select">
        <option value="">Rate</option>
        <option value="S">S</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
    </div>

    <div class="mina-wiki-clear-row">
      <button
        type="button"
        id="clearFilters"
        class="mina-clear-filter-btn"
        onclick="clearFilters()"
      >
        Xóa bộ lọc
      </button>
    </div>

  </section>

  <!-- GRID -->
  <section id="wikiGrid" class="wiki-grid"></section>

</main>
<script src="/js/public/wiki-engine.js?v=10.4.2"></script>
<script type="module" src="/js/mina-seo-pro.js?v=2.0.0"></script>
</body>
</html>
