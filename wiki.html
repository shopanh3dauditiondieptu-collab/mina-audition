<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Mina Wikimedia D8 Audition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/wiki.css">
</head>

<body>

  <main class="mina-wiki-page">

    <section class="wiki-hero">
      <span class="wiki-badge">MINA WIKIMEDIA</span>
      <h1>Wikipedia D8 Audition</h1>
      <p>Kho dữ liệu Skill Audition D8 do Mina xây dựng.</p>
    </section>

    <section class="wiki-tools">
      <input 
        type="text" 
        id="wikiSearch" 
        placeholder="Tìm theo ID Skill, tên skill, style..."
      >

      <select id="wikiStyleFilter">
        <option value="">Tất cả Style</option>
      </select>

      <select id="wikiRarityFilter">
        <option value="">Tất cả độ hiếm</option>
        <option value="S">S</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
    </section>

    <section id="wikiGrid" class="wiki-grid"></section>

  </main>

  <script src="js/wiki.js"></script>
</body>
</html>
