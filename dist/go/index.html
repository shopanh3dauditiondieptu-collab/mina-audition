<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Đang chuyển hướng | Mina Audition</title>
  <style>
    :root{color-scheme:dark;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#27103c 0,#090716 48%,#05040d 100%);color:#fff;padding:24px}
    main{width:min(520px,100%);padding:36px;border:1px solid #34506d;border-radius:24px;background:rgba(17,18,42,.92);text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.38)}
    .logo{width:76px;height:76px;border-radius:50%;object-fit:cover;margin-bottom:16px}
    h1{font-size:25px;margin:0 0 10px}
    p{color:#c8c8e8;line-height:1.6;margin:0}
    .spinner{width:42px;height:42px;border:4px solid rgba(255,255,255,.18);border-top-color:#69e8ff;border-radius:50%;margin:24px auto;animation:spin .8s linear infinite}
    .error{display:none;margin-top:22px;padding:16px;border:1px solid #e25588;border-radius:14px;background:#40162d;color:#ffd7e6}
    .actions{display:none;margin-top:18px;gap:10px;justify-content:center;flex-wrap:wrap}
    a{display:inline-flex;padding:11px 18px;border-radius:999px;text-decoration:none;font-weight:700;background:linear-gradient(90deg,#72e5ff,#ef56ca);color:#090716}
    a.secondary{background:#181a38;color:#fff;border:1px solid #47617d}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main>
    <img class="logo" src="/assets/images/logo-mina.png" alt="Mina Audition" onerror="this.style.display='none'">
    <h1 id="title">Đang mở liên kết…</h1>
    <p id="message">Mina Audition đang kiểm tra Smart Link và chuyển bạn đến trang đích.</p>
    <div class="spinner" id="spinner" aria-hidden="true"></div>
    <div class="error" id="errorBox"></div>
    <div class="actions" id="actions">
      <a href="/" class="secondary">Về trang chủ</a>
    </div>
  </main>
  <script type="module" src="/js/go-redirect.js"></script>
</body>
</html>
